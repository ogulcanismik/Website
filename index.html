<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Oğulcan Ismık — new grad in computer engineering, focused on game programming with Unity, C#, and TTRPG tools."
    />
    <meta name="theme-color" content="#12151c" />
    <meta property="og:title" content="Oğulcan Ismık — Portfolio" />
    <meta
      property="og:description"
      content="New grad portfolio focused on game programming — Unity, C#, jam games, and TTRPG tools."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ogulcanismik.com/" />
    <link rel="canonical" href="https://ogulcanismik.com/" />
    <title>Oğulcan Ismık — Portfolio</title>
    <script>
      (function () {
        var theme = localStorage.getItem('theme') || 'dark';
        var locale = localStorage.getItem('locale') || 'en';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('lang', locale);
      })();
    </script>
    <style>
      .welcome__role,
      .welcome__hint {
        opacity: 0;
        visibility: hidden;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="identity-mark" aria-hidden="true">
      <span class="identity-mark__text identity-mark__text--binary">01</span>
      <span class="identity-mark__text identity-mark__text--initials">OI</span>
      <span class="identity-mark__glitch identity-mark__glitch--a">01</span>
      <span class="identity-mark__glitch identity-mark__glitch--b">OI</span>
    </div>

    <div class="top-controls">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button class="lang-toggle__btn is-active" type="button" data-lang="en" aria-pressed="true">EN</button>
        <span class="lang-toggle__sep" aria-hidden="true">|</span>
        <button class="lang-toggle__btn" type="button" data-lang="tr" aria-pressed="false">TR</button>
      </div>
      <button
        class="theme-toggle"
        type="button"
        data-label-light="Switch to light mode"
        data-label-dark="Switch to dark mode"
        aria-label="Switch to light mode"
      >☀</button>
    </div>

    <main>
      <section id="welcome" class="welcome" aria-label="Welcome">
        <div class="welcome__content">
          <h1 class="welcome__name" aria-label="Oğulcan Ismık">
            <span class="welcome__name-inner" aria-hidden="true">
              <span class="welcome__name-o">O</span>
              <span class="welcome__name-middle">ğulcan </span>
              <span class="welcome__name-i">I</span>
              <span class="welcome__name-rest">smık</span>
            </span>
          </h1>
          <p class="welcome__role">// new grad · game programming</p>
        </div>
        <p class="welcome__hint" aria-hidden="true">
          descend<span class="welcome__hint-arrow">↓</span>
        </p>
      </section>

      <nav id="menu" class="menu" aria-label="Main navigation">
        <button class="menu__column" data-panel="projects" type="button">
          <span class="menu__label">Creations</span>
        </button>
        <button class="menu__column" data-panel="about" type="button">
          <span class="menu__label">About Me</span>
        </button>
        <button class="menu__column" data-panel="cv" type="button">
          <span class="menu__label">CV</span>
        </button>
        <button class="menu__column" data-panel="contact" type="button">
          <span class="menu__label">Contact</span>
        </button>
      </nav>

      <section id="panels" class="panels" aria-live="polite">
        <div class="panels__wrapper"></div>
      </section>
    </main>

    <button
      class="back-to-menu"
      type="button"
      aria-label="Back to menu"
      aria-hidden="true"
    >
      ↑ return to menu
    </button>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
