<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Your Name — software developer. Projects, about, CV, and contact."
    />
    <meta name="theme-color" content="#12151c" />
    <meta property="og:title" content="Your Name — Portfolio" />
    <meta
      property="og:description"
      content="Software developer portfolio showcasing projects, experience, and contact."
    />
    <meta property="og:type" content="website" />
    <title>Your Name — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section id="welcome" class="welcome" aria-label="Welcome">
        <div class="welcome__content">
          <h1 class="welcome__name">Your Name</h1>
          <p class="welcome__role">// software developer</p>
        </div>
        <p class="welcome__hint" aria-hidden="true">
          scroll<span class="welcome__hint-arrow">↓</span>
        </p>
      </section>

      <nav id="menu" class="menu" aria-label="Main navigation">
        <button class="menu__column" data-panel="projects" type="button">
          <span class="menu__label">Projects</span>
        </button>
        <button class="menu__column" data-panel="about" type="button">
          <span class="menu__label">About Me</span>
        </button>
        <button class="menu__column" data-panel="cv" type="button">
          <span class="menu__label">CV</span>
        </button>
        <button class="menu__column" data-panel="contact" type="button">
          <span class="menu__label">Contact</span>
        </button>
      </nav>

      <section id="panels" class="panels" aria-live="polite">
        <div class="panels__wrapper"></div>
      </section>
    </main>

    <button
      class="back-to-menu"
      type="button"
      aria-label="Back to menu"
      aria-hidden="true"
    >
      ↑ back to menu
    </button>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
